<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ExpenseIQ — Smart Expense Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- ── HEADER ─────────────────────────────────────── -->
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-icon">◈</span>
                <span class="logo-text">ExpenseIQ</span>
            </div>
            <div class="header-meta">
                <span class="header-date" id="currentDate"></span>
                <img src="https://i.pravatar.cc/150?img=68" alt="Profile Avatar" class="profile-avatar" />
            </div>
        </div>
    </header>

    <main class="main">

        <!-- ── STAT CARDS ─────────────────────────────── -->
        <section class="stats-grid">
            <div class="stat-card stat-card--total">
                <div class="stat-label">Total Spent</div>
                <div class="stat-value" id="totalAmount">₹0.00</div>
                <div class="stat-sub" id="totalCount">0 expenses</div>
            </div>
            <div class="stat-card stat-card--month">
                <div class="stat-label">This Month</div>
                <div class="stat-value" id="monthAmount">₹0.00</div>
                <div class="stat-sub" id="monthCount">0 expenses</div>
            </div>
            <div class="stat-card stat-card--top">
                <div class="stat-label">Top Category</div>
                <div class="stat-value stat-value--sm" id="topCategory">—</div>
                <div class="stat-sub" id="topCategoryAmount">₹0.00</div>
            </div>
        </section>

        <!-- ── MAIN CONTENT GRID ─────────────────────── -->
        <div class="content-grid">

            <!-- LEFT: Add Expense Form -->
            <aside class="panel panel--form">
                <div class="panel-header">
                    <h2 class="panel-title">Add Expense</h2>
                    <span class="panel-badge">New</span>
                </div>

                <form id="expenseForm" class="expense-form" novalidate>

                    <div class="field-group">
                        <label class="field-label" for="title">Title</label>
                        <input
                            type="text"
                            id="title"
                            class="field-input"
                            placeholder="e.g. Grocery shopping"
                            maxlength="100"
                            required
                        />
                        <span class="field-error" id="titleError"></span>
                    </div>

                    <div class="field-group">
                        <label class="field-label" for="amount">Amount (₹)</label>
                        <div class="input-prefix-wrap">
                            <span class="input-prefix">₹</span>
                            <input
                                type="number"
                                id="amount"
                                class="field-input field-input--prefixed"
                                placeholder="0.00"
                                min="0.01"
                                step="0.01"
                                required
                            />
                        </div>
                        <span class="field-error" id="amountError"></span>
                    </div>

                    <div class="field-group">
                        <label class="field-label" for="category">Category</label>
                        <div class="select-wrap">
                            <select id="category" class="field-input field-select" required>
                                <option value="">Select category</option>
                                <option value="Food">🍔 Food</option>
                                <option value="Transport">🚗 Transport</option>
                                <option value="Shopping">🛍️ Shopping</option>
                                <option value="Health">💊 Health</option>
                                <option value="Entertainment">🎬 Entertainment</option>
                                <option value="Education">📚 Education</option>
                                <option value="Utilities">💡 Utilities</option>
                                <option value="Travel">✈️ Travel</option>
                                <option value="Other">📦 Other</option>
                            </select>
                            <span class="select-arrow">▾</span>
                        </div>
                        <span class="field-error" id="categoryError"></span>
                    </div>

                    <div class="field-group">
                        <label class="field-label" for="date">Date</label>
                        <input
                            type="date"
                            id="date"
                            class="field-input"
                            required
                        />
                        <span class="field-error" id="dateError"></span>
                    </div>

                    <button type="submit" class="btn-submit" id="submitBtn">
                        <span class="btn-text">Add Expense</span>
                        <span class="btn-icon">+</span>
                    </button>

                    <div class="form-feedback" id="formFeedback"></div>

                </form>

                <!-- Category Breakdown -->
                <div class="breakdown-panel">
                    <h3 class="breakdown-title">Category Breakdown</h3>
                    <div id="categoryBreakdown" class="breakdown-list">
                        <div class="empty-breakdown">No data yet</div>
                    </div>
                </div>

            </aside>

            <!-- RIGHT: Expense List -->
            <section class="panel panel--list">
                <div class="panel-header">
                    <h2 class="panel-title">Expenses</h2>
                    <div class="filter-row">
                        <div class="select-wrap select-wrap--sm">
                            <select id="filterCategory" class="field-input field-select field-select--sm">
                                <option value="">All Categories</option>
                            </select>
                            <span class="select-arrow">▾</span>
                        </div>
                        <button class="btn-clear" id="clearFilter" style="display:none">Clear</button>
                    </div>
                </div>

                <!-- Loading state -->
                <div class="loading-state" id="loadingState">
                    <div class="spinner"></div>
                    <span>Loading expenses…</span>
                </div>

                <!-- Empty state -->
                <div class="empty-state" id="emptyState" style="display:none">
                    <div class="empty-icon">◈</div>
                    <p class="empty-title">No expenses yet</p>
                    <p class="empty-sub">Add your first expense using the form.</p>
                </div>

                <!-- Expense Cards -->
                <div class="expense-list" id="expenseList"></div>

            </section>
        </div>

    </main>

    <!-- ── DELETE CONFIRM MODAL ─────────────────────── -->
    <div class="modal-overlay" id="modalOverlay" style="display:none">
        <div class="modal">
            <div class="modal-icon">⚠</div>
            <h3 class="modal-title">Delete Expense?</h3>
            <p class="modal-body">This action cannot be undone.</p>
            <div class="modal-actions">
                <button class="btn-cancel" id="modalCancel">Cancel</button>
                <button class="btn-delete-confirm" id="modalConfirm">Delete</button>
            </div>
        </div>
    </div>

    <!-- ── TOAST NOTIFICATION ──────────────────────── -->
    <div class="toast" id="toast"></div>

    <script src="app.js"></script>
</body>
</html>
