# ─────────────────────────────────────────────────────────
#  Expense Tracker — MongoDB Configuration
# ─────────────────────────────────────────────────────────

server.port=8080

# ─── MongoDB Connection ──────────────────────────────────
#
# Default MongoDB runs on localhost:27017 with NO password.
# The database "expense_tracker_db" will be created automatically
# the first time you save an expense. You don't need to create it!
#
# Format: mongodb://localhost:27017/YOUR_DATABASE_NAME

spring.data.mongodb.uri=mongodb+srv://thapliyalsuryansh:123qweasd@cluster0.gwxbyat.mongodb.net/ExpenseTracker?appName=Cluster0

# ─── That's it! No username, no password needed by default ──
# (If you set up MongoDB with authentication, use this format instead:)
# spring.data.mongodb.uri=mongodb://username:password@localhost:27017/expense_tracker_db

# ─── Logging ────────────────────────────────────────────
logging.level.com.expensetracker=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG

# ─── Jackson (JSON date format) ─────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
