# ─────────────────────────────────────────────────────────
#  Expense Tracker — MongoDB Configuration
# ─────────────────────────────────────────────────────────

server.port=8080

# ─── MongoDB Connection ──────────────────────────────────
#
# Local default: MongoDB on localhost:27017 with database expense_tracker_db.
# Override with MONGODB_URI if you want to use Atlas or another host.
#
# Example local URI:
# mongodb://localhost:27017/expense_tracker_db

spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/expense_tracker_db}

# ─── That's it! ───────────────────────────────────────────

# ─── Logging ────────────────────────────────────────────
logging.level.com.expensetracker=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG

# ─── Jackson (JSON date format) ─────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
